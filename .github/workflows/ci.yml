name: MathDevMCP CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  base-release-gates:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,symbolic]" coverage
      - name: Maintainer checks
        run: scripts/maintainer_check.sh
      - name: Tests
        run: CUDA_VISIBLE_DEVICES=-1 PYTHONPATH=src coverage run --branch -m pytest -q
      - name: Coverage report
        run: |
          coverage report
          coverage xml -o coverage.xml
      - name: External capability collection report
        run: pytest --collect-only -q -m requires_external_tool > external-capability-tests.txt
      - uses: actions/upload-artifact@v4
        with:
          name: engineering-evidence-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            external-capability-tests.txt
      - name: Release smoke
        run: scripts/release_smoke.sh "$PWD"
      - name: Release matrix
        run: scripts/release_matrix.sh "$PWD"
      - name: Public release surface check
        run: PYTHONPATH=src python -m mathdevmcp.cli public-release-check --root "$PWD"
      - name: Release hypothesis check
        run: PYTHONPATH=src python -m mathdevmcp.cli release-hypothesis-check --root "$PWD" --public

  package-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest
          python -m pip wheel --no-deps . -w dist
          python -m twine check dist/*
      - name: Install and exercise built wheel
        run: |
          WHEEL=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          python -m pip install "${WHEEL}[mcp,symbolic]"
          python -m pip check
          python -m mathdevmcp.cli doctor
          python scripts/mcp_stdio_smoke.py --root "$PWD"
          python scripts/create_release_manifest.py --root "$PWD" --wheel "$WHEEL" --output dist/release-manifest.json
      - name: Security and supply-chain scan
        run: scripts/security_scan.sh "$PWD"
