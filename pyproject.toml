[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mathdevmcp"
version = "0.1.0"
description = "Mathematical development MCP tools for large docs and code-doc consistency"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
mathdevmcp = "mathdevmcp.cli:main"
mathdevmcp-mcp = "mathdevmcp.mcp_server:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
